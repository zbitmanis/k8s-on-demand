---
# Sensor: tenant-onboard — webhook → submit tenant-onboard WorkflowTemplate
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: tenant-onboard-sensor
  namespace: argo-events
spec:
  dependencies:
    - name: onboard-request
      eventSourceName: webhook-source
      eventName: onboard-tenant

  triggers:
    - template:
        name: submit-onboard-workflow
        argoWorkflow:
          operation: submit
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: tenant-onboard-
                namespace: argo
              spec:
                workflowTemplateRef:
                  name: tenant-onboard
                arguments:
                  parameters:
                    - name: tenant_id
                    - name: scripts_image
                      value: "platform-scripts:latest"
          parameters:
            - src:
                dependencyName: onboard-request
                dataKey: body.tenant_id
              dest: spec.arguments.parameters.0.value

  # RBAC: sensor service account may only submit Workflows to argo namespace
  template:
    serviceAccountName: argo-events-sensor

