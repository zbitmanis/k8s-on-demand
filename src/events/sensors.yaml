---
# Sensor: scheduled graceful suspend — calendar → cluster-suspend WorkflowTemplate (action=suspend)
# Drains tenants + sends Slack notification + leaves Argo Workflow audit trail
# EventBridge also triggers the Lambda directly on the same schedule (hard path, no drain)
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: scheduled-suspend-sensor
  namespace: argo-events
spec:
  dependencies:
    - name: suspend-tick
      eventSourceName: calendar-source
      eventName: cluster-suspend-schedule

  triggers:
    - template:
        name: submit-scheduled-suspend
        argoWorkflow:
          operation: submit
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: cluster-scheduled-suspend-
                namespace: argo
              spec:
                workflowTemplateRef:
                  name: cluster-suspend
                arguments:
                  parameters:
                    - name: action
                      value: suspend
                    - name: drain_timeout_sec
                      value: "60"

  template:
    serviceAccountName: argo-events-sensor

