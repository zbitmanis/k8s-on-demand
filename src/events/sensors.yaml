---
# Sensor: graceful suspend — webhook → cluster-suspend WorkflowTemplate (action=suspend)
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: cluster-suspend-sensor
  namespace: argo-events
spec:
  dependencies:
    - name: suspend-request
      eventSourceName: webhook-source
      eventName: suspend-cluster

  triggers:
    - template:
        name: submit-suspend-workflow
        argoWorkflow:
          operation: submit
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: cluster-suspend-
                namespace: argo
              spec:
                workflowTemplateRef:
                  name: cluster-suspend
                arguments:
                  parameters:
                    - name: action
                      value: suspend
                    - name: drain_timeout_sec
                      value: "120"
          parameters:
            - src:
                dependencyName: suspend-request
                dataKey: body.drain_timeout_sec
                value: "120"   # default if not provided in payload
              dest: spec.arguments.parameters.1.value

  template:
    serviceAccountName: argo-events-sensor

