thanos:
  # Only deploy components needed alongside the Prometheus sidecar:
  # - query: fans out queries to Prometheus + sidecar
  # - storegateway: reads historical blocks from S3
  # compactor disabled — dev cluster data is ephemeral (30d retention)

  global:
    image:
      repository: quay.io/thanos/thanos
      tag: v0.39.2

    nodeSelector:
      node-role: system

    tolerations:
      - key: node-role
        operator: Equal
        value: system
        effect: NoSchedule

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi

    objstore:
      # Bucket, region injected at bootstrap via App-of-Apps helm.values
      # (argocd app set app-of-apps --helm-set spec.gitops.applications.thanosSidecar.*)
      createSecret: true
      secretName: thanos-objstore
      secretKey: objstore.yml
      config: |
        type: S3
        config:
          bucket: ""
          region: ""

    serviceAccount:
      create: true
      annotations:
        # IRSA role ARN — injected at bootstrap via App-of-Apps helm.values
        eks.amazonaws.com/role-arn: ""

  query:
    enabled: true
    replicaCount: 1

  storegateway:
    enabled: true
    replicaCount: 1
    persistence:
      enabled: true
      storageClass: gp3
      size: 2Gi

  compactor:
    enabled: false
