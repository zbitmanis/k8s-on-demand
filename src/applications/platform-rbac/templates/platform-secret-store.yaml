{{- if .Values.esoRoleArn }}
# ClusterSecretStore for platform secrets (/platform/* in AWS Secrets Manager).
# Depends on ESO being ready (sync-wave 2). All platform ExternalSecrets reference
# this store by name: platform.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: platform
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.awsRegion | quote }}
      role: {{ .Values.esoRoleArn | quote }}
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
{{- end }}
