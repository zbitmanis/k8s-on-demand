---
# ServiceAccount used by Argo Events sensors
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-events-sensor
  namespace: argo-events
---
# Role in argo namespace — sensors may only submit Workflows
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-events-sensor
  namespace: argo
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows"]
    verbs: ["create", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-events-sensor
  namespace: argo
subjects:
  - kind: ServiceAccount
    name: argo-events-sensor
    namespace: argo-events
roleRef:
  kind: Role
  name: argo-events-sensor
  apiGroup: rbac.authorization.k8s.io
---
# Role in argo-events namespace — EventSource needs to read the HMAC secret
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-events-sensor-secrets
  namespace: argo-events
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-events-sensor-secrets
  namespace: argo-events
subjects:
  - kind: ServiceAccount
    name: argo-events-sensor
    namespace: argo-events
roleRef:
  kind: Role
  name: argo-events-sensor-secrets
  apiGroup: rbac.authorization.k8s.io
