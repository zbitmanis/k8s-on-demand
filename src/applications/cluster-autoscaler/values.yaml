cluster-autoscaler:
  # clusterName and awsRegion injected via ArgoCD app parameters at bootstrap
  autoDiscovery:
    clusterName: ""

  awsRegion: ""

  rbac:
    serviceAccount:
      create: true
      annotations:
        # IRSA role ARN — injected at bootstrap via App-of-Apps helm.values.
        # Chart uses rbac.serviceAccount.annotations (not top-level serviceAccount.annotations).
        eks.amazonaws.com/role-arn: ""

  # Run on system nodes
  nodeSelector:
    node-role: system

  tolerations:
    - key: node-role
      operator: Equal
      value: system
      effect: NoSchedule

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi

  extraArgs:
    # Only manage the workload ASG (tagged); ignore system nodes
    balance-similar-node-groups: false
    # Workload nodes run only tenant pods — all are evictable
    skip-nodes-with-system-pods: false
    # Prefer cheapest instance type that fits pending pods
    expander: least-waste
    # Conservative scale-down delay for sandbox use
    scale-down-delay-after-add: 5m
    scale-down-unneeded-time: 5m
