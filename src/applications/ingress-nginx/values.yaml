ingress-nginx:
  controller:
    # Runs on workload nodes (not system nodes) — handles tenant traffic
    replicaCount: 1

    service:
      type: LoadBalancer
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
        service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
        service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
