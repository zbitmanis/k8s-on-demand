apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sblocksystemtainttoleration
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  crd:
    spec:
      names:
        kind: K8sBlockSystemTaintToleration
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sblocksystemtainttoleration
        violation[{"msg": msg}] {
          t := input.review.object.spec.tolerations[_]
          t.key == "node-role"
          t.value == "system"
          t.effect == "NoSchedule"
          msg := "Tenant pods must not tolerate the node-role=system:NoSchedule taint"
        }
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sBlockSystemTaintToleration
metadata:
  name: block-system-taint-toleration
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  enforcementAction: {{ .Values.enforceAction }}
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values: {{ .Values.excludedNamespaces | toJson }}
