external-secrets:
  replicaCount: 1

  serviceAccount:
    name: external-secrets   # override: release name is external-secrets-operator, fullname template would produce that; platform ClusterSecretStore hardcodes this name
    annotations: {}          # eks.amazonaws.com/role-arn injected at bootstrap via app-of-apps irsaRoleArn

  nodeSelector:
    node-role: system

  tolerations:
    - key: node-role
      operator: Equal
      value: system
      effect: NoSchedule

  webhook:
    replicaCount: 1
    nodeSelector:
      node-role: system
    tolerations:
      - key: node-role
        operator: Equal
        value: system
        effect: NoSchedule

  certController:
    replicaCount: 1
    nodeSelector:
      node-role: system
    tolerations:
      - key: node-role
        operator: Equal
        value: system
        effect: NoSchedule

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi
