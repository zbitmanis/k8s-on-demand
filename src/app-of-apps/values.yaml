spec:
  destination:
    server: https://kubernetes.default.svc  # Single shared cluster

  default:
    # Injected at deploy time via Helm parameter in app-of-apps-application.yaml.
    # For offline helm template/lint runs pass: --set spec.default.repoURL=https://github.com/org/repo.git
    repoURL: ""
    helm:
      valueFiles:
        - values.yaml

  source:
    targetRevision: HEAD

  gitops:
    tenantApplicationSet:
      isEnabled: true

    applications:

      externalSecretsOperator:
        appPath: src/applications/external-secrets-operator
        namespace: external-secrets
        isEnabled: true
        isEnabledAutoSync: true

      prometheus:
        appPath: src/applications/prometheus
        namespace: monitoring
        isEnabled: true
        isEnabledAutoSync: true

      thanosSidecar:
        appPath: src/applications/thanos-sidecar
        namespace: monitoring
        isEnabled: true
        isEnabledAutoSync: true
        thanosBucket: ""         # injected at bootstrap: argocd app set app-of-apps --helm-set spec.gitops.applications.thanosSidecar.thanosBucket=<bucket>
        awsRegion: ""            # injected at bootstrap: argocd app set app-of-apps --helm-set spec.gitops.applications.thanosSidecar.awsRegion=<region>
        workflowRunnerRoleArn: ""  # injected at bootstrap: argocd app set app-of-apps --helm-set spec.gitops.applications.thanosSidecar.workflowRunnerRoleArn=<arn>

      ingressNginx:
        appPath: src/applications/ingress-nginx
        namespace: ingress-nginx
        isEnabled: true
        isEnabledAutoSync: true

      clusterAutoscaler:
        appPath: src/applications/cluster-autoscaler
        namespace: kube-system
        isEnabled: true
        isEnabledAutoSync: true
        irsaRoleArn: ""   # injected at bootstrap: argocd app set app-of-apps --helm-set spec.gitops.applications.clusterAutoscaler.irsaRoleArn=<arn>

      awsLoadBalancerController:
        appPath: src/applications/aws-load-balancer-controller
        namespace: aws
        isEnabled: true
        isEnabledAutoSync: true

      certManager:
        appPath: src/applications/cert-manager
        namespace: cert-manager
        isEnabled: true
        isEnabledAutoSync: true

      gatekeeper:
        appPath: src/applications/gatekeeper
        namespace: gatekeeper-system
        isEnabled: true
        isEnabledAutoSync: true

      gatekeeperPolicies:
        appPath: src/applications/gatekeeper-policies
        namespace: gatekeeper-system
        isEnabled: true
        isEnabledAutoSync: true

      argoWorkflows:
        appPath: src/applications/argo-workflows
        namespace: argo
        isEnabled: true
        isEnabledAutoSync: true
        artifactsBucket: ""    # injected at bootstrap: argocd app set app-of-apps --helm-set spec.gitops.applications.argoWorkflows.artifactsBucket=<bucket>
        awsRegion: ""          # injected at bootstrap: argocd app set app-of-apps --helm-set spec.gitops.applications.argoWorkflows.awsRegion=<region>
        workflowRunnerRoleArn: ""  # injected at bootstrap: argocd app set app-of-apps --helm-set spec.gitops.applications.argoWorkflows.workflowRunnerRoleArn=<arn>

      argoEvents:
        appPath: src/applications/argo-events
        namespace: argo-events
        isEnabled: true
        isEnabledAutoSync: true

      platformRbac:
        appPath: src/applications/platform-rbac
        namespace: argo
        isEnabled: true
        isEnabledAutoSync: true

      # Day 1 — Crossplane and AWS provider must be installed in order:
      # 1. crossplane (core), 2. crossplaneProviderAws (provider + ProviderConfig),
      # 3. crossplaneCompositions (XRDs + Compositions)
      crossplane:
        appPath: src/applications/crossplane
        namespace: crossplane-system
        isEnabled: true
        isEnabledAutoSync: true

      crossplaneProviderAws:
        appPath: src/crossplane/providers
        namespace: crossplane-system
        isEnabled: true
        isEnabledAutoSync: true

      crossplaneCompositions:
        appPath: src/crossplane/compositions
        namespace: crossplane-system
        isEnabled: true
        isEnabledAutoSync: false   # manual sync — composition changes need review
