{{- if .Values.spec.gitops.applications.awsLoadBalancerController.isEnabled | default false }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aws-load-balancer-controller
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: {{ .Values.spec.gitops.applications.awsLoadBalancerController.namespace | default "aws" }}
  project: {{ .Values.spec.gitops.applications.awsLoadBalancerController.project | default "default" }}
  source:
    path: {{ .Values.spec.gitops.applications.awsLoadBalancerController.appPath }}
    repoURL: {{ .Values.spec.gitops.applications.awsLoadBalancerController.repoURL | default .Values.spec.default.repoURL }}
    targetRevision: {{ .Values.spec.gitops.applications.awsLoadBalancerController.targetRevision | default .Values.spec.source.targetRevision }}
    helm:
      valueFiles:
        {{- range $val := .Values.spec.default.helm.valueFiles }}
          - {{ $val }}
        {{- end }}
      {{- if .Values.spec.gitops.applications.awsLoadBalancerController.irsaRoleArn }}
      values: |
        aws-load-balancer-controller:
          clusterName: {{ .Values.spec.gitops.applications.awsLoadBalancerController.clusterName | quote }}
          serviceAccount:
            annotations:
              eks.amazonaws.com/role-arn: {{ .Values.spec.gitops.applications.awsLoadBalancerController.irsaRoleArn | quote }}
      {{- end }}
{{- if .Values.spec.gitops.applications.awsLoadBalancerController.isEnabledAutoSync | default false }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
{{- end }}
{{- end }}
