{{- if .Values.spec.gitops.applications.argocd.isEnabled | default false }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: argocd
  project: {{ .Values.spec.gitops.applications.argocd.project | default "platform-system" }}
  source:
    path: {{ .Values.spec.gitops.applications.argocd.appPath }}
    repoURL: {{ .Values.spec.gitops.applications.argocd.repoURL | default .Values.spec.default.repoURL }}
    targetRevision: {{ .Values.spec.gitops.applications.argocd.targetRevision | default .Values.spec.source.targetRevision }}
    helm:
      releaseName: argocd
      valueFiles:
        {{- range $val := .Values.spec.default.helm.valueFiles }}
          - {{ $val }}
        {{- end }}
{{- if .Values.spec.gitops.applications.argocd.isEnabledAutoSync | default false }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true   # intentional — ArgoCD is not injected via argocd app set; Git is source of truth
    syncOptions:
      - RespectIgnoreDifferences=true
      - ServerSideApply=true
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
{{- end }}
{{- end }}
