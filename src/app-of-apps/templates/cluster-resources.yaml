{{- if .Values.spec.gitops.applications.clusterResources.isEnabled | default false }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-resources
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: ""   # cluster-scoped resources (StorageClass, CRDs, etc.)
  project: {{ .Values.spec.gitops.applications.clusterResources.project | default "platform-system" }}
  source:
    path: {{ .Values.spec.gitops.applications.clusterResources.appPath }}
    repoURL: {{ .Values.spec.gitops.applications.clusterResources.repoURL | default .Values.spec.default.repoURL }}
    targetRevision: {{ .Values.spec.gitops.applications.clusterResources.targetRevision | default .Values.spec.source.targetRevision }}
{{- if .Values.spec.gitops.applications.clusterResources.isEnabledAutoSync | default false }}
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - Replace=true   # StorageClass immutable fields require replace, not patch
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
{{- end }}
{{- end }}
