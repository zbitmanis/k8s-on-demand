{{- if .Values.spec.gitops.applications.argoWorkflows.isEnabled | default false }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-workflows
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    server: {{ .Values.spec.destination.server }}
    namespace: {{ .Values.spec.gitops.applications.argoWorkflows.namespace | default "argo" }}
  project: {{ .Values.spec.gitops.applications.argoWorkflows.project | default "platform-system" }}
  source:
    path: {{ .Values.spec.gitops.applications.argoWorkflows.appPath }}
    repoURL: {{ .Values.spec.gitops.applications.argoWorkflows.repoURL | default .Values.spec.default.repoURL }}
    targetRevision: {{ .Values.spec.gitops.applications.argoWorkflows.targetRevision | default .Values.spec.source.targetRevision }}
    helm:
      valueFiles:
        {{- range $val := .Values.spec.default.helm.valueFiles }}
          - {{ $val }}
        {{- end }}
      {{- if .Values.spec.gitops.applications.argoWorkflows.workflowRunnerRoleArn }}
      values: |
        argo-workflows:
          artifactRepository:
            s3:
              bucket: {{ .Values.spec.gitops.applications.argoWorkflows.artifactsBucket | quote }}
              region: {{ .Values.spec.gitops.applications.argoWorkflows.awsRegion | quote }}
              roleARN: {{ .Values.spec.gitops.applications.argoWorkflows.workflowRunnerRoleArn | quote }}
          workflow:
            serviceAccount:
              annotations:
                eks.amazonaws.com/role-arn: {{ .Values.spec.gitops.applications.argoWorkflows.workflowRunnerRoleArn | quote }}
      {{- end }}
{{- if .Values.spec.gitops.applications.argoWorkflows.isEnabledAutoSync | default false }}
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
{{- end }}
{{- end }}
