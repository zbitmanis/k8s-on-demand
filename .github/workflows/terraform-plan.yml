name: Terraform plan (drift detection)

on:
  schedule:
    - cron: "0 2 * * 1-5"   # 02:00 UTC Monday–Friday only
  workflow_dispatch:
    inputs:
      version:
        description: Release version that triggered this run (optional)
        required: false
        type: string
      action:
        description: "plan — detect drift only; apply — apply the plan"
        required: false
        type: choice
        default: plan
        options: [plan, apply]
      dry_run:
        description: "Skip state lock (useful when lock is held)"
        required: false
        type: choice
        default: "false"
        options: ["true", "false"]

permissions:
  contents: read
  id-token: write   # OIDC for AWS auth

env:
  TF_DIR: src/terraform/environments/production

jobs:
  plan:
    name: Terraform plan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TERRAFORM_ROLE_ARN }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="key=cluster/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TERRAFORM_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform plan
        id: plan
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_google_saml_metadata_xml: ${{ secrets.GOOGLE_SAML_METADATA_XML }}
        run: |
          LOCK_FLAG=""
          [[ "${{ inputs.dry_run }}" == "true" ]] && LOCK_FLAG="-lock=false"
          terraform plan \
            -var-file=terraform.tfvars \
            -var="region=${{ vars.AWS_REGION }}" \
            -out=plan.tfplan \
            -detailed-exitcode \
            $LOCK_FLAG \
            2>&1 | tee plan.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        # Exit codes: 0=no changes, 1=error, 2=changes detected
        continue-on-error: true

      - name: Terraform apply
        if: inputs.action == 'apply' && steps.plan.outputs.exit_code == '2'
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_google_saml_metadata_xml: ${{ secrets.GOOGLE_SAML_METADATA_XML }}
        run: terraform apply plan.tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: ${{ env.TF_DIR }}/plan.txt
          retention-days: 7

      - name: Notify drift detected
        if: steps.plan.outputs.exit_code == '2'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          PLAN_SUMMARY=$(grep -E '^Plan:|^No changes' ${{ env.TF_DIR }}/plan.txt | head -1 || echo "See artifact for details")
          TRIGGER="${{ inputs.version && format('Release v{0}', inputs.version) || 'Scheduled drift check' }}"

          if [[ -z "$SLACK_WEBHOOK_URL" ]]; then
            echo "SLACK_WEBHOOK_URL not set — skipping Slack notification"
            exit 0
          fi
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"attachments\": [{
                \"color\": \"warning\",
                \"title\": \":warning: Terraform drift detected\",
                \"text\": \"*Trigger:* ${TRIGGER}\n*Summary:* ${PLAN_SUMMARY}\n*Run:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\nReview and apply manually — never auto-apply drift.\",
                \"mrkdwn_in\": [\"text\"]
              }]
            }"

      - name: Fail on plan error
        if: steps.plan.outputs.exit_code == '1'
        run: |
          echo "Terraform plan returned an error. See logs above."
          exit 1
