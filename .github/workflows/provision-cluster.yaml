name: Provision cluster

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

permissions:
  contents: read
  id-token: write   # OIDC for AWS auth

env:
  TF_DIR: src/terraform/environments/production
  ARGOCD_VERSION: v2.10.6
  ARGOCD_NAMESPACE: argocd

jobs:
  # ── 1. Terraform apply ────────────────────────────────────────────────────
  terraform-apply:
    name: Terraform apply
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}   # requires approval for production
    outputs:
      cluster_name:                  ${{ steps.tf-outputs.outputs.cluster_name }}
      cluster_endpoint:              ${{ steps.tf-outputs.outputs.cluster_endpoint }}
      thanos_bucket:                 ${{ steps.tf-outputs.outputs.thanos_bucket }}
      artifacts_bucket:              ${{ steps.tf-outputs.outputs.artifacts_bucket }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TERRAFORM_ROLE_ARN }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="key=cluster/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TERRAFORM_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      # Phase 1: apply foundation (IAM roles + VPC) so their ARNs are known state.
      # terraform-aws-eks uses managed node group role ARNs as for_each keys in
      # aws_eks_access_entry; on a fresh apply these are unknown, causing a plan
      # error.  Pre-applying the IAM and VPC modules makes all ARNs known before
      # the EKS module runs.
      - name: Terraform apply — foundation (IAM + VPC + node group roles)
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_google_saml_metadata_xml: ${{ secrets.GOOGLE_SAML_METADATA_XML }}
        run: |
          terraform apply \
            -auto-approve \
            -target=module.iam_management \
            -target=module.vpc \
            -target=module.eks_cluster.aws_iam_role.node_group \
            -target=module.eks_cluster.aws_iam_role_policy_attachment.node_group_worker_node \
            -target=module.eks_cluster.aws_iam_role_policy_attachment.node_group_cni \
            -target=module.eks_cluster.aws_iam_role_policy_attachment.node_group_ecr \
            -var-file=terraform.tfvars \
            -var="region=${{ vars.AWS_REGION }}" \
            -var="environment=${{ inputs.environment }}"

      - name: Terraform apply — full
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_google_saml_metadata_xml: ${{ secrets.GOOGLE_SAML_METADATA_XML }}
        run: |
          terraform apply \
            -auto-approve \
            -var-file=terraform.tfvars \
            -var="region=${{ vars.AWS_REGION }}" \
            -var="environment=${{ inputs.environment }}"

      - name: Export Terraform outputs
        id: tf-outputs
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "cluster_name=$(terraform output -raw cluster_name)"                         >> "$GITHUB_OUTPUT"
          echo "cluster_endpoint=$(terraform output -raw cluster_endpoint)"                 >> "$GITHUB_OUTPUT"
          echo "thanos_bucket=${{ secrets.THANOS_METRICS_BUCKET }}"                        >> "$GITHUB_OUTPUT"
          echo "artifacts_bucket=${{ secrets.ARGO_ARTIFACTS_BUCKET }}"                     >> "$GITHUB_OUTPUT"

  # ── 2. Bootstrap ArgoCD ───────────────────────────────────────────────────
  bootstrap-argocd:
    name: Bootstrap ArgoCD
    runs-on: ubuntu-latest
    needs: terraform-apply

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TERRAFORM_ROLE_ARN }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name "${{ needs.terraform-apply.outputs.cluster_name }}" \
            --region "${{ vars.AWS_REGION }}"

      - name: Create argocd namespace
        run: kubectl create namespace "${{ env.ARGOCD_NAMESPACE }}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Install ArgoCD
        run: |
          kubectl apply -n "${{ env.ARGOCD_NAMESPACE }}" \
            -f "https://raw.githubusercontent.com/argoproj/argo-cd/${{ env.ARGOCD_VERSION }}/manifests/install.yaml"

      - name: Patch ArgoCD workloads for system node scheduling
        run: |
          # All ArgoCD components must tolerate the system node taint and be
          # pinned to system nodes.  The upstream install.yaml has no tolerations,
          # so we patch every Deployment and the StatefulSet after apply.
          TAINT_PATCH=$(cat <<'EOF'
          {
            "spec": {
              "template": {
                "spec": {
                  "tolerations": [
                    {"key": "node-role", "operator": "Equal", "value": "system", "effect": "NoSchedule"}
                  ],
                  "nodeSelector": {"node-role": "system"}
                }
              }
            }
          }
          EOF
          )
          for deploy in argocd-server argocd-repo-server argocd-applicationset-controller argocd-dex-server argocd-notifications-controller argocd-redis; do
            kubectl patch deployment "$deploy" -n "${{ env.ARGOCD_NAMESPACE }}" --type=merge -p "$TAINT_PATCH"
          done
          kubectl patch statefulset argocd-application-controller -n "${{ env.ARGOCD_NAMESPACE }}" --type=merge -p "$TAINT_PATCH"

      - name: Wait for ArgoCD server
        run: |
          kubectl rollout status deployment/argocd-server \
            -n "${{ env.ARGOCD_NAMESPACE }}" \
            --timeout=300s

      - name: Apply platform-system AppProject
        run: |
          sed "s|\${GITHUB_REPOSITORY}|${{ github.repository }}|g" \
            .github/argocd/platform-system-project.yaml \
            | kubectl apply -f -

      - name: Apply App-of-Apps Application
        run: |
          # Substitute repo URL and apply
          sed "s|\${GITHUB_REPOSITORY}|${{ github.repository }}|g" \
            .github/argocd/app-of-apps-application.yaml \
            | kubectl apply -f -

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            "https://github.com/argoproj/argo-cd/releases/download/${{ env.ARGOCD_VERSION }}/argocd-linux-amd64"
          chmod +x /usr/local/bin/argocd

      - name: Inject Terraform outputs into ArgoCD app parameters
        run: |
          ARGOCD_PASS=$(kubectl -n argocd get secret argocd-initial-admin-secret \
            -o jsonpath="{.data.password}" | base64 -d)
          kubectl port-forward svc/argocd-server -n argocd 8080:443 &
          PF_PID=$!
          sleep 5

          argocd login localhost:8080 \
            --username admin \
            --password "$ARGOCD_PASS" \
            --insecure

          # Wait for App-of-Apps to complete its first sync so all child
          # Applications exist before we run argocd app set on them.
          echo "Waiting for App-of-Apps to sync..."
          argocd app wait app-of-apps --operation --timeout 120 || true

          CLUSTER_NAME="${{ needs.terraform-apply.outputs.cluster_name }}"
          THANOS_BUCKET="${{ needs.terraform-apply.outputs.thanos_bucket }}"
          ARTIFACTS_BUCKET="${{ needs.terraform-apply.outputs.artifacts_bucket }}"
          GITHUB_ORG="$(echo '${{ github.repository }}' | cut -d/ -f1)"
          GITHUB_REPO="$(echo '${{ github.repository }}' | cut -d/ -f2)"

          # Construct ARNs and resource names deterministically — avoids terraform output dependency.
          AWS_ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          WORKFLOW_RUNNER_ARN="arn:aws:iam::${AWS_ACCOUNT_ID}:role/platform-argo-workflow-runner"
          CLUSTER_AUTOSCALER_ARN="arn:aws:iam::${AWS_ACCOUNT_ID}:role/${CLUSTER_NAME}-cluster-autoscaler"
          LBC_ARN="arn:aws:iam::${AWS_ACCOUNT_ID}:role/${CLUSTER_NAME}-load-balancer-controller"
          THANOS_ARN="arn:aws:iam::${AWS_ACCOUNT_ID}:role/${CLUSTER_NAME}-thanos-sidecar"
          SUSPEND_LAMBDA_NAME="${CLUSTER_NAME}-cluster-suspend"

          # aws-load-balancer-controller: inject cluster name and IRSA via App-of-Apps (durable through selfHeal)
          argocd app set app-of-apps \
            --helm-set "spec.gitops.applications.awsLoadBalancerController.clusterName=${CLUSTER_NAME}" \
            --helm-set "spec.gitops.applications.awsLoadBalancerController.irsaRoleArn=${LBC_ARN}" \
            || true

          # thanos-sidecar + prometheus: inject metrics bucket and region via App-of-Apps parameter
          argocd app set app-of-apps \
            --helm-set "spec.gitops.applications.thanosSidecar.thanosBucket=${THANOS_BUCKET}" \
            --helm-set "spec.gitops.applications.thanosSidecar.awsRegion=${{ vars.AWS_REGION }}" \
            --helm-set "spec.gitops.applications.thanosSidecar.irsaRoleArn=${THANOS_ARN}" \
            --helm-set "spec.gitops.applications.prometheus.thanosBucket=${THANOS_BUCKET}" \
            --helm-set "spec.gitops.applications.prometheus.awsRegion=${{ vars.AWS_REGION }}" \
            || true

          # argo-workflows: inject artifacts bucket, region, and runner role
          argocd app set argo-workflows \
            --helm-set "argo-workflows.artifactRepository.s3.bucket=${ARTIFACTS_BUCKET}" \
            --helm-set "argo-workflows.artifactRepository.s3.region=${{ vars.AWS_REGION }}" \
            --helm-set "argo-workflows.artifactRepository.s3.roleARN=${WORKFLOW_RUNNER_ARN}" \
            || true

          # platform-rbac: inject github org/repo, workflow runner role ARN, and suspend config
          argocd app set platform-rbac \
            --helm-set "workflowRunnerRoleArn=${WORKFLOW_RUNNER_ARN}" \
            --helm-set "awsRegion=${{ vars.AWS_REGION }}" \
            --helm-set "suspendLambdaName=${SUSPEND_LAMBDA_NAME}" \
            --helm-set "github.org=${GITHUB_ORG}" \
            --helm-set "github.repo=${GITHUB_REPO}" \
            || true

          # cluster-autoscaler: inject cluster name and region into child app
          argocd app set cluster-autoscaler \
            --helm-set "cluster-autoscaler.autoDiscovery.clusterName=${CLUSTER_NAME}" \
            --helm-set "cluster-autoscaler.awsRegion=${{ vars.AWS_REGION }}" \
            --helm-set "cluster-autoscaler.rbac.serviceAccount.annotations.eks\\.amazonaws\\.com/role-arn=${CLUSTER_AUTOSCALER_ARN}" \
            || true

          kill $PF_PID 2>/dev/null || true

      - name: Restart cluster-autoscaler to pick up IRSA annotation
        run: |
          # argocd app set updates the ServiceAccount annotation but does not
          # restart existing pods. Rollout restart forces new pods so the EKS
          # pod identity webhook injects the IRSA token.
          # SA and Deployment are both named <release>-aws-cluster-autoscaler.
          kubectl rollout restart deployment/cluster-autoscaler-aws-cluster-autoscaler -n kube-system
          kubectl rollout status deployment/cluster-autoscaler-aws-cluster-autoscaler -n kube-system --timeout=120s

  # ── 3. Wait for all system apps healthy ──────────────────────────────────
  wait-healthy:
    name: Wait for system apps
    runs-on: ubuntu-latest
    needs: [terraform-apply, bootstrap-argocd]

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TERRAFORM_ROLE_ARN }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name "${{ needs.terraform-apply.outputs.cluster_name }}" \
            --region "${{ vars.AWS_REGION }}"

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            "https://github.com/argoproj/argo-cd/releases/download/${{ env.ARGOCD_VERSION }}/argocd-linux-amd64"
          chmod +x /usr/local/bin/argocd

      - name: Wait for all apps healthy (timeout 20 min)
        run: |
          ARGOCD_SERVER="localhost:8080"
          ARGOCD_PASS=$(kubectl -n argocd get secret argocd-initial-admin-secret \
            -o jsonpath="{.data.password}" | base64 -d)

          kubectl port-forward svc/argocd-server -n argocd 8080:443 &
          PF_PID=$!
          sleep 5

          argocd login "$ARGOCD_SERVER" \
            --username admin \
            --password "$ARGOCD_PASS" \
            --insecure

          EXPECTED_APPS="aws-load-balancer-controller cert-manager external-secrets-operator gatekeeper gatekeeper-policies ingress-nginx prometheus thanos-sidecar argo-workflows argo-events platform-rbac cluster-autoscaler"
          TIMEOUT=1200  # 20 minutes
          ELAPSED=0

          while true; do
            ALL_HEALTHY=true
            for app in $EXPECTED_APPS; do
              STATUS=$(argocd app get "$app" --output json 2>/dev/null \
                | jq -r '.status.health.status // "Unknown"')
              SYNC=$(argocd app get "$app" --output json 2>/dev/null \
                | jq -r '.status.sync.status // "Unknown"')
              if [[ "$STATUS" != "Healthy" || "$SYNC" != "Synced" ]]; then
                echo "  $app: health=$STATUS sync=$SYNC"
                ALL_HEALTHY=false
              fi
            done

            if $ALL_HEALTHY; then
              echo "All system apps are Healthy and Synced."
              break
            fi

            if (( ELAPSED >= TIMEOUT )); then
              echo "Timeout waiting for system apps to become healthy."
              kill $PF_PID 2>/dev/null || true
              exit 1
            fi

            echo "Waiting... (${ELAPSED}s elapsed)"
            sleep 30
            ELAPSED=$(( ELAPSED + 30 ))
          done

          kill $PF_PID 2>/dev/null || true

  # ── 4. Notify ─────────────────────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [terraform-apply, wait-healthy]
    if: always()

    steps:
      - name: Post Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [[ "${{ needs.wait-healthy.result }}" == "success" ]]; then
            COLOR="good"
            TEXT=":white_check_mark: Cluster *${{ needs.terraform-apply.outputs.cluster_name }}* provisioned and healthy.\nEndpoint: \`${{ needs.terraform-apply.outputs.cluster_endpoint }}\`\n\`aws eks update-kubeconfig --name ${{ needs.terraform-apply.outputs.cluster_name }} --region ${{ vars.AWS_REGION }}\`"
          else
            COLOR="danger"
            TEXT=":x: Cluster provisioning failed for *${{ needs.terraform-apply.outputs.cluster_name }}*. Check the workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          if [[ -z "$SLACK_WEBHOOK_URL" ]]; then
            echo "SLACK_WEBHOOK_URL not set — skipping Slack notification"
            exit 0
          fi
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"attachments\":[{\"color\":\"$COLOR\",\"text\":\"$TEXT\",\"mrkdwn_in\":[\"text\"]}]}"
