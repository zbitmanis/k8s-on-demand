name: Provision cluster

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]
      force_argocd_install:
        description: 'Pass --force to helm upgrade (replaces immutable resources). Use only when ArgoCD upgrade fails due to immutable field conflicts.'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write   # OIDC for AWS auth

env:
  TF_DIR: src/terraform/environments/production
  ARGOCD_CLI_VERSION: v2.10.6   # ArgoCD CLI version â€” must match appVersion in src/applications/argocd/Chart.yaml
  ARGOCD_NAMESPACE: argocd

jobs:
  # â”€â”€ 1. Terraform apply â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  terraform-apply:
    name: Terraform apply
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}   # requires approval for production
    outputs:
      cluster_name:                  ${{ steps.tf-outputs.outputs.cluster_name }}
      cluster_endpoint:              ${{ steps.tf-outputs.outputs.cluster_endpoint }}
      thanos_bucket:                 ${{ steps.tf-outputs.outputs.thanos_bucket }}
      artifacts_bucket:              ${{ steps.tf-outputs.outputs.artifacts_bucket }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TERRAFORM_ROLE_ARN }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="key=cluster/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TERRAFORM_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      # Phase 1: apply foundation (IAM roles + VPC) so their ARNs are known state.
      # terraform-aws-eks uses managed node group role ARNs as for_each keys in
      # aws_eks_access_entry; on a fresh apply these are unknown, causing a plan
      # error.  Pre-applying the IAM and VPC modules makes all ARNs known before
      # the EKS module runs.
      - name: Terraform apply â€” foundation (IAM + VPC + node group roles)
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_google_saml_metadata_xml: ${{ secrets.GOOGLE_SAML_METADATA_XML }}
        run: |
          terraform apply \
            -auto-approve \
            -target=module.iam_management \
            -target=module.vpc \
            -target=module.eks_cluster.aws_iam_role.node_group \
            -target=module.eks_cluster.aws_iam_role_policy_attachment.node_group_worker_node \
            -target=module.eks_cluster.aws_iam_role_policy_attachment.node_group_cni \
            -target=module.eks_cluster.aws_iam_role_policy_attachment.node_group_ecr \
            -var-file=terraform.tfvars \
            -var="region=${{ vars.AWS_REGION }}" \
            -var="environment=${{ inputs.environment }}"

      - name: Terraform apply â€” full
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_google_saml_metadata_xml: ${{ secrets.GOOGLE_SAML_METADATA_XML }}
        run: |
          terraform apply \
            -auto-approve \
            -var-file=terraform.tfvars \
            -var="region=${{ vars.AWS_REGION }}" \
            -var="environment=${{ inputs.environment }}"

      - name: Export Terraform outputs
        id: tf-outputs
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "cluster_name=$(terraform output -raw cluster_name)"                         >> "$GITHUB_OUTPUT"
          echo "cluster_endpoint=$(terraform output -raw cluster_endpoint)"                 >> "$GITHUB_OUTPUT"
          echo "thanos_bucket=${{ vars.THANOS_METRICS_BUCKET }}"                          >> "$GITHUB_OUTPUT"
          echo "artifacts_bucket=${{ vars.ARGO_ARTIFACTS_BUCKET }}"                       >> "$GITHUB_OUTPUT"

  # â”€â”€ 2. Bootstrap ArgoCD â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  bootstrap-argocd:
    name: Bootstrap ArgoCD
    runs-on: ubuntu-latest
    needs: terraform-apply

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TERRAFORM_ROLE_ARN }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name "${{ needs.terraform-apply.outputs.cluster_name }}" \
            --region "${{ vars.AWS_REGION }}"

      - name: Install ArgoCD
        run: |
          # Bootstrap only: install ArgoCD on a fresh cluster.
          # Once installed, ArgoCD self-manages its own Helm release via the argocd
          # Application in app-of-apps â€” never upgrade from here (dual-writer conflict).
          # For maintenance upgrades bump appVersion in src/applications/argocd/Chart.yaml
          # and let ArgoCD self-sync. For break-glass force-reinstall set
          # force_argocd_install=true â€” this skips the exists check and reinstalls.
          if helm status argocd -n "${{ env.ARGOCD_NAMESPACE }}" &>/dev/null \
              && [[ "${{ inputs.force_argocd_install }}" != "true" ]]; then
            echo "ArgoCD already installed and force_argocd_install=false â€” skipping (ArgoCD self-manages)"
            exit 0
          fi

          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update
          helm dependency build src/applications/argocd/
          helm install argocd src/applications/argocd/ \
            -n "${{ env.ARGOCD_NAMESPACE }}" \
            --create-namespace \
            --wait \
            --timeout 300s

      - name: Apply platform-system AppProject
        run: |
          sed "s|\${GITHUB_REPOSITORY}|${{ github.repository }}|g" \
            .github/argocd/platform-system-project.yaml \
            | kubectl apply -f -

      - name: Apply App-of-Apps Application
        run: |
          # Substitute repo URL and apply
          sed "s|\${GITHUB_REPOSITORY}|${{ github.repository }}|g" \
            .github/argocd/app-of-apps-application.yaml \
            | kubectl apply -f -

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            "https://github.com/argoproj/argo-cd/releases/download/${{ env.ARGOCD_CLI_VERSION }}/argocd-linux-amd64"
          chmod +x /usr/local/bin/argocd

      - name: Inject Terraform outputs into ArgoCD app parameters
        run: |
          ARGOCD_PASS=$(kubectl -n argocd get secret argocd-initial-admin-secret \
            -o jsonpath="{.data.password}" | base64 -d)
          kubectl port-forward svc/argocd-server -n argocd 8080:443 &
          PF_PID=$!
          sleep 5

          argocd login localhost:8080 \
            --username admin \
            --password "$ARGOCD_PASS" \
            --insecure

          # Wait for App-of-Apps to complete its first sync so all child
          # Applications exist before we run argocd app set on them.
          echo "Waiting for App-of-Apps to sync..."
          argocd app wait app-of-apps --operation --timeout 120 || true

          CLUSTER_NAME="${{ needs.terraform-apply.outputs.cluster_name }}"
          THANOS_BUCKET="${{ needs.terraform-apply.outputs.thanos_bucket }}"
          ARTIFACTS_BUCKET="${{ needs.terraform-apply.outputs.artifacts_bucket }}"
          GITHUB_ORG="$(echo '${{ github.repository }}' | cut -d/ -f1)"
          GITHUB_REPO="$(echo '${{ github.repository }}' | cut -d/ -f2)"

          # Construct ARNs and resource names deterministically â€” avoids terraform output dependency.
          AWS_ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          WORKFLOW_RUNNER_ARN="arn:aws:iam::${AWS_ACCOUNT_ID}:role/platform-argo-workflow-runner"
          CLUSTER_AUTOSCALER_ARN="arn:aws:iam::${AWS_ACCOUNT_ID}:role/${CLUSTER_NAME}-cluster-autoscaler"
          LBC_ARN="arn:aws:iam::${AWS_ACCOUNT_ID}:role/${CLUSTER_NAME}-load-balancer-controller"
          THANOS_ARN="arn:aws:iam::${AWS_ACCOUNT_ID}:role/${CLUSTER_NAME}-thanos-sidecar"
          PROMETHEUS_ARN="arn:aws:iam::${AWS_ACCOUNT_ID}:role/${CLUSTER_NAME}-prometheus-thanos-sidecar"
          ESO_PLATFORM_ARN="arn:aws:iam::${AWS_ACCOUNT_ID}:role/${CLUSTER_NAME}-eso-platform"
          SUSPEND_LAMBDA_NAME="${CLUSTER_NAME}-cluster-suspend"

          # Inject all runtime values via App-of-Apps (durable through selfHeal)
          argocd app set app-of-apps \
            --helm-set "spec.gitops.applications.awsLoadBalancerController.clusterName=${CLUSTER_NAME}" \
            --helm-set "spec.gitops.applications.awsLoadBalancerController.irsaRoleArn=${LBC_ARN}" \
            --helm-set "spec.gitops.applications.thanosSidecar.thanosBucket=${THANOS_BUCKET}" \
            --helm-set "spec.gitops.applications.thanosSidecar.awsRegion=${{ vars.AWS_REGION }}" \
            --helm-set "spec.gitops.applications.thanosSidecar.irsaRoleArn=${THANOS_ARN}" \
            --helm-set "spec.gitops.applications.prometheus.thanosBucket=${THANOS_BUCKET}" \
            --helm-set "spec.gitops.applications.prometheus.awsRegion=${{ vars.AWS_REGION }}" \
            --helm-set "spec.gitops.applications.prometheus.irsaRoleArn=${PROMETHEUS_ARN}" \
            --helm-set "spec.gitops.applications.externalSecretsOperator.irsaRoleArn=${ESO_PLATFORM_ARN}" \
            || true

          # argo-workflows: inject artifacts bucket, region, and runner role via app-of-apps (durable through selfHeal)
          argocd app set app-of-apps \
            --helm-set "spec.gitops.applications.argoWorkflows.artifactsBucket=${ARTIFACTS_BUCKET}" \
            --helm-set "spec.gitops.applications.argoWorkflows.awsRegion=${{ vars.AWS_REGION }}" \
            --helm-set "spec.gitops.applications.argoWorkflows.workflowRunnerRoleArn=${WORKFLOW_RUNNER_ARN}" \
            || true

          # platform-rbac: inject github org/repo, workflow runner role ARN, ESO platform role, and suspend config
          argocd app set platform-rbac \
            --helm-set "workflowRunnerRoleArn=${WORKFLOW_RUNNER_ARN}" \
            --helm-set "esoRoleArn=${ESO_PLATFORM_ARN}" \
            --helm-set "awsRegion=${{ vars.AWS_REGION }}" \
            --helm-set "suspendLambdaName=${SUSPEND_LAMBDA_NAME}" \
            --helm-set "github.org=${GITHUB_ORG}" \
            --helm-set "github.repo=${GITHUB_REPO}" \
            || true

          # cluster-autoscaler: inject cluster name, region, and IRSA role via app-of-apps (durable through selfHeal)
          argocd app set app-of-apps \
            --helm-set "spec.gitops.applications.clusterAutoscaler.clusterName=${CLUSTER_NAME}" \
            --helm-set "spec.gitops.applications.clusterAutoscaler.awsRegion=${{ vars.AWS_REGION }}" \
            --helm-set "spec.gitops.applications.clusterAutoscaler.irsaRoleArn=${CLUSTER_AUTOSCALER_ARN}" \
            || true

          kill $PF_PID 2>/dev/null || true

  # â”€â”€ 3. Wait for all system apps healthy â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  wait-healthy:
    name: Wait for system apps
    runs-on: ubuntu-latest
    needs: [terraform-apply, bootstrap-argocd]

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TERRAFORM_ROLE_ARN }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name "${{ needs.terraform-apply.outputs.cluster_name }}" \
            --region "${{ vars.AWS_REGION }}"

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            "https://github.com/argoproj/argo-cd/releases/download/${{ env.ARGOCD_CLI_VERSION }}/argocd-linux-amd64"
          chmod +x /usr/local/bin/argocd

      - name: Wait for all apps healthy (timeout 20 min)
        run: |
          ARGOCD_SERVER="localhost:8080"
          ARGOCD_PASS=$(kubectl -n argocd get secret argocd-initial-admin-secret \
            -o jsonpath="{.data.password}" | base64 -d)

          start_port_forward() {
            kubectl port-forward svc/argocd-server -n argocd 8080:443 \
              >/dev/null 2>&1 &
            echo $!
          }

          PF_PID=$(start_port_forward)
          sleep 5

          argocd login "$ARGOCD_SERVER" \
            --username admin \
            --password "$ARGOCD_PASS" \
            --insecure

          EXPECTED_APPS="aws-load-balancer-controller cert-manager external-secrets-operator gatekeeper gatekeeper-policies ingress-nginx prometheus thanos-sidecar argo-workflows argo-events platform-rbac cluster-autoscaler"
          TIMEOUT=1200  # 20 minutes
          ELAPSED=0
          DEGRADED_WARN_APPS=""

          while true; do
            # Restart port-forward if it died (broken pipe kills the process)
            if ! kill -0 "$PF_PID" 2>/dev/null; then
              echo "  port-forward died â€” restarting..."
              PF_PID=$(start_port_forward)
              sleep 3
            fi

            # Single API call for all app statuses
            APP_JSON=$(argocd app list --output json 2>/dev/null || echo "[]")

            ALL_READY=true
            DEGRADED_WARN_APPS=""
            for app in $EXPECTED_APPS; do
              HEALTH=$(echo "$APP_JSON" | jq -r \
                --arg a "$app" \
                '.[] | select(.metadata.name==$a) | .status.health.status // "Unknown"')
              SYNC=$(echo "$APP_JSON" | jq -r \
                --arg a "$app" \
                '.[] | select(.metadata.name==$a) | .status.sync.status // "Unknown"')

              if [[ "$HEALTH" == "Healthy" ]]; then
                : # healthy â€” no action
              elif [[ "$HEALTH" == "Degraded" && "$SYNC" == "Synced" ]]; then
                # Deployed and synced but a resource is degraded (e.g. ClusterSecretStore
                # not yet connected). Warn but do not block â€” often transient at bootstrap.
                DEGRADED_WARN_APPS="$DEGRADED_WARN_APPS $app"
              else
                # Unknown health or OutOfSync â€” still converging
                echo "  $app: health=$HEALTH sync=$SYNC"
                ALL_READY=false
              fi
            done

            if $ALL_READY; then
              if [[ -n "$DEGRADED_WARN_APPS" ]]; then
                echo "âš ď¸Ź Degraded+Synced (may be transient):$DEGRADED_WARN_APPS"
              fi
              echo "All system apps ready."
              break
            fi

            if (( ELAPSED >= TIMEOUT )); then
              echo "Timeout waiting for system apps to become healthy."
              kill $PF_PID 2>/dev/null || true
              exit 1
            fi

            echo "Waiting... (${ELAPSED}s elapsed)"
            sleep 30
            ELAPSED=$(( ELAPSED + 30 ))
          done

          kill $PF_PID 2>/dev/null || true

  # â”€â”€ 4. Notify â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [terraform-apply, wait-healthy]
    if: always()

    steps:
      - name: Post Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [[ "${{ needs.wait-healthy.result }}" == "success" ]]; then
            COLOR="good"
            TEXT=":white_check_mark: Cluster *${{ needs.terraform-apply.outputs.cluster_name }}* provisioned and healthy.\nEndpoint: \`${{ needs.terraform-apply.outputs.cluster_endpoint }}\`\n\`aws eks update-kubeconfig --name ${{ needs.terraform-apply.outputs.cluster_name }} --region ${{ vars.AWS_REGION }}\`"
          else
            COLOR="danger"
            TEXT=":x: Cluster provisioning failed for *${{ needs.terraform-apply.outputs.cluster_name }}*. Check the workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          if [[ -z "$SLACK_WEBHOOK_URL" ]]; then
            echo "SLACK_WEBHOOK_URL not set â€” skipping Slack notification"
            exit 0
          fi
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"attachments\":[{\"color\":\"$COLOR\",\"text\":\"$TEXT\",\"mrkdwn_in\":[\"text\"]}]}"
