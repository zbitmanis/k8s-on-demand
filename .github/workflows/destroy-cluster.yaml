name: Destroy cluster

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]
      confirm:
        description: 'Type "destroy" to confirm'
        required: true
        type: string

permissions:
  contents: read
  id-token: write   # OIDC for AWS auth

env:
  TF_DIR: src/terraform/environments/production

jobs:
  # ── Guard: require explicit confirmation ─────────────────────────────────
  check-confirmation:
    name: Check confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation input
        run: |
          if [[ "${{ inputs.confirm }}" != "destroy" ]]; then
            echo "Confirmation input must be exactly 'destroy'. Got: '${{ inputs.confirm }}'"
            exit 1
          fi

  # ── 1. Pre-destroy drain ──────────────────────────────────────────────────
  # Deletes all LoadBalancer Services before Terraform destroy.
  # Without this step, orphaned ALB/NLB ENIs will block VPC deletion.
  pre-destroy-drain:
    name: Pre-destroy drain
    runs-on: ubuntu-latest
    needs: check-confirmation

    steps:
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TERRAFORM_ROLE_ARN }}
          aws-region:     ${{ secrets.AWS_REGION }}

      - name: Terraform init (to read cluster name from state)
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="key=cluster/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TERRAFORM_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Get cluster name from state
        id: cluster
        working-directory: ${{ env.TF_DIR }}
        run: echo "name=$(terraform output -raw cluster_name 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"

      - name: Configure kubectl
        if: steps.cluster.outputs.name != ''
        run: |
          aws eks update-kubeconfig \
            --name "${{ steps.cluster.outputs.name }}" \
            --region "${{ secrets.AWS_REGION }}" || true

      - name: Delete LoadBalancer services
        if: steps.cluster.outputs.name != ''
        run: |
          echo "Deleting all LoadBalancer Services to release ALB/NLB ENIs..."
          kubectl get svc --all-namespaces \
            -o jsonpath='{range .items[?(@.spec.type=="LoadBalancer")]}{.metadata.namespace}{" "}{.metadata.name}{"\n"}{end}' \
          | while read -r ns name; do
              if [[ -n "$ns" && -n "$name" ]]; then
                echo "  Deleting $ns/$name"
                kubectl delete svc "$name" -n "$ns" --ignore-not-found
              fi
            done

      - name: Wait for ENI detachment
        if: steps.cluster.outputs.name != ''
        run: |
          echo "Waiting 120s for AWS to detach ENIs..."
          sleep 120

  # ── 2. Terraform destroy ──────────────────────────────────────────────────
  terraform-destroy:
    name: Terraform destroy
    runs-on: ubuntu-latest
    needs: pre-destroy-drain
    environment: ${{ inputs.environment }}   # requires approval for production

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TERRAFORM_ROLE_ARN }}
          aws-region:     ${{ secrets.AWS_REGION }}

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="key=cluster/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TERRAFORM_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform destroy
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform destroy \
            -auto-approve \
            -var-file=terraform.tfvars \
            -var="environment=${{ inputs.environment }}"

  # ── 3. Notify ─────────────────────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: terraform-destroy
    if: always()

    steps:
      - name: Post Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [[ "${{ needs.terraform-destroy.result }}" == "success" ]]; then
            COLOR="good"
            TEXT=":recycle: Cluster destroyed successfully (environment: *${{ inputs.environment }}*). All AWS resources removed."
          else
            COLOR="danger"
            TEXT=":x: Cluster destruction failed (environment: *${{ inputs.environment }}*). Manual cleanup may be required.\nWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"attachments\":[{\"color\":\"$COLOR\",\"text\":\"$TEXT\",\"mrkdwn_in\":[\"text\"]}]}"
