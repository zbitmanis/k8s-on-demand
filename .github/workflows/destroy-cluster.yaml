name: Destroy cluster

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]
      confirm:
        description: 'Type "destroy" to confirm'
        required: true
        type: string

permissions:
  contents: read
  id-token: write   # OIDC for AWS auth

env:
  TF_DIR: src/terraform/environments/production

jobs:
  # ── Guard: require explicit confirmation ─────────────────────────────────
  check-confirmation:
    name: Check confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation input
        run: |
          if [[ "${{ inputs.confirm }}" != "destroy" ]]; then
            echo "Confirmation input must be exactly 'destroy'. Got: '${{ inputs.confirm }}'"
            exit 1
          fi

  # ── 1. Drain Crossplane XRC claims ───────────────────────────────────────
  # Best-effort: delete all tenant XRC claims, wait 5 min, report stragglers.
  # Always proceeds — XRC resources (S3, IAM) do not block VPC deletion.
  drain-crossplane:
    name: Drain Crossplane XRC claims
    runs-on: ubuntu-latest
    needs: check-confirmation

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TERRAFORM_ROLE_ARN }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Terraform init (to read cluster name)
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="key=cluster/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TERRAFORM_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Get cluster name from state
        id: cluster
        working-directory: ${{ env.TF_DIR }}
        run: echo "name=$(terraform output -raw cluster_name 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"

      - name: Configure kubectl
        if: steps.cluster.outputs.name != ''
        run: |
          aws eks update-kubeconfig \
            --name "${{ steps.cluster.outputs.name }}" \
            --region "${{ vars.AWS_REGION }}" || true

      - name: Delete all Crossplane XRC claims
        if: steps.cluster.outputs.name != ''
        run: |
          CLAIM_KINDS=$(kubectl get xrd \
            -o jsonpath='{.items[*].spec.claimNames.kind}' 2>/dev/null || echo "")
          if [[ -z "$CLAIM_KINDS" ]]; then
            echo "No Crossplane XRDs found — skipping XRC drain"
            exit 0
          fi
          for kind in $CLAIM_KINDS; do
            echo "Deleting all $kind claims across namespaces..."
            kubectl delete "$kind" --all-namespaces --ignore-not-found || true
          done

      - name: Wait for XRC deletion (5 min timeout, report stragglers)
        if: steps.cluster.outputs.name != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          CLAIM_KINDS=$(kubectl get xrd \
            -o jsonpath='{.items[*].spec.claimNames.kind}' 2>/dev/null || echo "")
          if [[ -z "$CLAIM_KINDS" ]]; then
            exit 0
          fi
          TIMEOUT=300
          ELAPSED=0
          while [[ $ELAPSED -lt $TIMEOUT ]]; do
            ALL_GONE=true
            STRAGGLERS=""
            for kind in $CLAIM_KINDS; do
              ITEMS=$(kubectl get "$kind" -A \
                --ignore-not-found --no-headers 2>/dev/null || echo "")
              if [[ -n "$ITEMS" ]]; then
                ALL_GONE=false
                STRAGGLERS="${STRAGGLERS}${ITEMS}\n"
              fi
            done
            if $ALL_GONE; then
              echo "All XRC claims deleted."
              exit 0
            fi
            echo "Waiting for XRC deletion... (${ELAPSED}s elapsed)"
            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done
          # Timeout — report stragglers, continue
          echo "⚠️ XRC drain timeout after ${TIMEOUT}s. Stragglers:"
          echo -e "$STRAGGLERS"
          STRAGGLER_COUNT=$(echo -e "$STRAGGLERS" | grep -c "." || echo "unknown")
          if [[ -n "$SLACK_WEBHOOK_URL" ]]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"text\": \"⚠️ Cluster destroy: ${STRAGGLER_COUNT} XRC claims still deleting after 5 min. Manual cleanup required after destroy.\"}"
          fi
          # Always proceed — XRC resources do not block VPC deletion

  # ── 2. Drain Kubernetes resources that create AWS objects ─────────────────
  # Suspends ArgoCD selfHeal, deletes Ingresses (→ ALBs), LB services (→ NLBs),
  # monitoring PVCs (→ EBS volumes). Waits for AWS deprovisioning.
  drain-k8s:
    name: Drain Kubernetes AWS resources
    runs-on: ubuntu-latest
    needs: drain-crossplane

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TERRAFORM_ROLE_ARN }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="key=cluster/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TERRAFORM_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Get cluster name from state
        id: cluster
        working-directory: ${{ env.TF_DIR }}
        run: echo "name=$(terraform output -raw cluster_name 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"

      - name: Configure kubectl
        if: steps.cluster.outputs.name != ''
        run: |
          aws eks update-kubeconfig \
            --name "${{ steps.cluster.outputs.name }}" \
            --region "${{ vars.AWS_REGION }}" || true

      - name: Suspend app-of-apps selfHeal (must be first)
        if: steps.cluster.outputs.name != ''
        run: |
          # Suspend app-of-apps first — otherwise it restores selfHeal on child apps
          kubectl patch application app-of-apps -n argocd \
            --type=merge \
            -p '{"spec":{"syncPolicy":{"automated":null}}}' \
            --ignore-not-found || true

      - name: Suspend selfHeal on all child Applications
        if: steps.cluster.outputs.name != ''
        run: |
          for app in $(kubectl get application -n argocd \
            -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || echo ""); do
            kubectl patch application "$app" -n argocd \
              --type=merge \
              -p '{"spec":{"syncPolicy":{"automated":null}}}' || true
          done

      - name: Delete all Ingress resources (triggers ALB deprovisioning)
        if: steps.cluster.outputs.name != ''
        run: |
          kubectl delete ingress --all-namespaces --ignore-not-found || true
          echo "Waiting 60s for ALB deprovisioning..."
          sleep 60

      - name: Delete all LoadBalancer services (triggers NLB/CLB deprovisioning)
        if: steps.cluster.outputs.name != ''
        run: |
          # Force-remove the LBC finalizer first — without this, kubectl delete svc
          # blocks indefinitely waiting for the finalizer to be cleared. The LBC
          # may be unable to call AWS APIs (IRSA token expired), so it never removes
          # the finalizer on its own.
          kubectl get svc --all-namespaces \
            -o jsonpath='{range .items[?(@.spec.type=="LoadBalancer")]}{.metadata.namespace}{" "}{.metadata.name}{"\n"}{end}' \
          | while read -r ns name; do
              if [[ -n "$ns" && -n "$name" ]]; then
                echo "  Removing LBC finalizer from $ns/$name"
                kubectl patch svc "$name" -n "$ns" \
                  -p '{"metadata":{"finalizers":[]}}' \
                  --type=merge --ignore-not-found || true
                echo "  Deleting LoadBalancer svc $ns/$name"
                kubectl delete svc "$name" -n "$ns" \
                  --wait=false --ignore-not-found || true
              fi
            done

      - name: Wait for AWS load balancers to be deprovisioned
        if: steps.cluster.outputs.name != ''
        run: |
          # Poll AWS directly — the kubernetes objects are gone but the AWS LBs
          # may still be deleting. VPC destroy will fail if LB ENIs still exist.
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=*${{ steps.cluster.outputs.name }}*" \
            --query 'Vpcs[0].VpcId' --output text 2>/dev/null || echo "")
          if [[ -z "$VPC_ID" || "$VPC_ID" == "None" ]]; then
            echo "VPC not found — skipping LB drain wait"
            exit 0
          fi
          echo "VPC: $VPC_ID — waiting for all LBs to be gone..."
          TIMEOUT=300
          ELAPSED=0
          while [[ $ELAPSED -lt $TIMEOUT ]]; do
            LB_COUNT=$(aws elbv2 describe-load-balancers \
              --query "length(LoadBalancers[?VpcId=='${VPC_ID}'])" \
              --output text 2>/dev/null || echo "0")
            CLASSIC_COUNT=$(aws elb describe-load-balancers \
              --query "length(LoadBalancerDescriptions[?VPCId=='${VPC_ID}'])" \
              --output text 2>/dev/null || echo "0")
            TOTAL=$((LB_COUNT + CLASSIC_COUNT))
            if [[ "$TOTAL" -eq 0 ]]; then
              echo "All load balancers removed."
              exit 0
            fi
            echo "  ${TOTAL} LB(s) still present (${ELAPSED}s elapsed)..."
            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done
          echo "⚠️ LB drain timeout after ${TIMEOUT}s — proceeding anyway. Terraform destroy may fail if ENIs remain."

      - name: Scale down monitoring StatefulSets before PVC delete
        if: steps.cluster.outputs.name != ''
        run: |
          # pvc-protection finalizer is held while a pod mounts the PVC.
          # kubectl delete pvc hangs until all consumers are gone.
          # Scale down first so kubelet releases the PVCs before we delete them.
          kubectl scale statefulset --all -n monitoring --replicas=0 || true
          kubectl scale deployment --all -n monitoring --replicas=0 || true
          echo "Waiting 30s for monitoring pods to terminate..."
          kubectl wait pod --all -n monitoring \
            --for=delete --timeout=60s || true

      - name: Delete monitoring PVCs (gp3 reclaimPolicy=Delete, EBS auto-released)
        if: steps.cluster.outputs.name != ''
        run: |
          # Scope: monitoring namespace only. Tenant namespaces use gp3-retain and
          # their EBS volumes intentionally survive cluster destruction.
          # --wait=false: deletion is accepted immediately; EBS release is async.
          kubectl delete pvc --all -n monitoring \
            --wait=false --ignore-not-found || true

      - name: Wait for EBS volumes to detach
        if: steps.cluster.outputs.name != ''
        run: |
          echo "Waiting 60s for EBS volumes to detach after PVC deletion..."
          sleep 60

  # ── 3. Remove ArgoCD ──────────────────────────────────────────────────────
  # Strips finalizers first (avoids deadlock when controllers are gone),
  # then helm uninstall with a force-delete namespace fallback.
  delete-argocd:
    name: Delete ArgoCD
    runs-on: ubuntu-latest
    needs: drain-k8s

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TERRAFORM_ROLE_ARN }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="key=cluster/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TERRAFORM_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Get cluster name from state
        id: cluster
        working-directory: ${{ env.TF_DIR }}
        run: echo "name=$(terraform output -raw cluster_name 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"

      - name: Configure kubectl
        if: steps.cluster.outputs.name != ''
        run: |
          aws eks update-kubeconfig \
            --name "${{ steps.cluster.outputs.name }}" \
            --region "${{ vars.AWS_REGION }}" || true

      - name: Strip finalizers from all Applications and AppProjects
        if: steps.cluster.outputs.name != ''
        run: |
          for app in $(kubectl get application -n argocd \
            -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || echo ""); do
            kubectl patch application "$app" -n argocd \
              -p '{"metadata":{"finalizers":[]}}' \
              --type=merge || true
          done
          for proj in $(kubectl get appproject -n argocd \
            -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || echo ""); do
            kubectl patch appproject "$proj" -n argocd \
              -p '{"metadata":{"finalizers":[]}}' \
              --type=merge || true
          done

      - name: Delete all Applications and AppProjects
        if: steps.cluster.outputs.name != ''
        run: |
          kubectl delete application --all -n argocd \
            --timeout=60s --ignore-not-found || true
          kubectl delete appproject --all -n argocd \
            --timeout=30s --ignore-not-found || true

      - name: Uninstall ArgoCD Helm release
        if: steps.cluster.outputs.name != ''
        run: |
          helm uninstall argocd -n argocd --timeout=120s || {
            echo "helm uninstall failed or timed out — force deleting namespace"
            kubectl patch namespace argocd \
              -p '{"metadata":{"finalizers":[]}}' \
              --type=merge || true
            kubectl delete ns argocd --force --grace-period=0 || true
          }

      - name: Verify ArgoCD namespace removed
        if: steps.cluster.outputs.name != ''
        run: |
          if kubectl get ns argocd 2>/dev/null; then
            echo "⚠️ argocd namespace still present — proceeding to terraform destroy anyway"
          else
            echo "argocd namespace removed successfully"
          fi

  # ── 4. Terraform destroy ──────────────────────────────────────────────────
  terraform-destroy:
    name: Terraform destroy
    runs-on: ubuntu-latest
    needs: delete-argocd
    environment: ${{ inputs.environment }}   # requires approval for production

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TERRAFORM_ROLE_ARN }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TERRAFORM_STATE_BUCKET }}" \
            -backend-config="key=cluster/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TERRAFORM_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform destroy
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_google_saml_metadata_xml: ${{ secrets.GOOGLE_SAML_METADATA_XML }}
        run: |
          terraform destroy \
            -auto-approve \
            -var-file=terraform.tfvars \
            -var="region=${{ vars.AWS_REGION }}" \
            -var="environment=${{ inputs.environment }}"

  # ── 5. Notify ─────────────────────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [terraform-destroy, drain-crossplane]
    if: always()

    steps:
      - name: Post Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [[ "${{ needs.terraform-destroy.result }}" == "success" ]]; then
            COLOR="good"
            TEXT=":recycle: Cluster destroyed successfully (environment: *${{ inputs.environment }}*). All AWS resources removed."
          else
            COLOR="danger"
            TEXT=":x: Cluster destruction failed (environment: *${{ inputs.environment }}*). Manual cleanup may be required.\nWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          if [[ -z "$SLACK_WEBHOOK_URL" ]]; then
            echo "SLACK_WEBHOOK_URL not set — skipping Slack notification"
            exit 0
          fi
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"attachments\":[{\"color\":\"$COLOR\",\"text\":\"$TEXT\",\"mrkdwn_in\":[\"text\"]}]}"
