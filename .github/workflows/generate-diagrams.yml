name: Generate PlantUML diagrams

on:
  push:
    branches: [main, master]
    paths:
      - "docs/diagrams/**.puml"
  pull_request:
    paths:
      - "docs/diagrams/**.puml"
  workflow_dispatch:
    inputs:
      force:
        description: "Re-render all diagrams (ignore mtime)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

permissions:
  contents: write   # needed to commit updated SVGs back to branch

jobs:
  generate:
    name: Render .puml → .svg
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use a token so the commit-back push triggers downstream workflows
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find changed .puml files
        id: changed
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
              | grep '\.puml$' | tr '\n' ' ')
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # On manual trigger always render all diagrams (force=true is the default intent)
            FILES=$(find docs -name '*.puml' | tr '\n' ' ')
          else
            FILES=$(git diff --name-only origin/${{ github.base_ref }} HEAD \
              | grep '\.puml$' | tr '\n' ' ')
          fi
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Changed .puml files: $FILES"

      - name: Pull PlantUML Docker image
        run: docker pull plantuml/plantuml:latest

      - name: Render diagrams
        run: |
          mkdir -p docs/images
          FORCE_FLAG=""
          if [[ "${{ inputs.force }}" == "true" ]]; then
            FORCE_FLAG="--all"
          fi
          python3 scripts/generate-diagrams.py $FORCE_FLAG

      - name: Check for SVG changes
        id: diff
        run: |
          git add docs/images/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated SVGs
        if: steps.diff.outputs.changed == 'true' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: regenerate PlantUML diagrams [skip ci]"
          git push

      - name: Comment on PR with diagram diff
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const changed = execSync('git diff --cached --name-only').toString().trim();
            const files = changed.split('\n').filter(Boolean);
            const list = files.map(f => `- \`${f}\``).join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## PlantUML diagram changes',
                '',
                'The following SVG files would be regenerated by this PR:',
                '',
                list,
                '',
                'SVGs are committed automatically when the PR is merged to main.',
              ].join('\n'),
            });
