name: Build and push platform-scripts image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to build and push (e.g. dev, sha-abc123)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if src/scripts changed since last release
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Manual trigger — skipping change check."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            PREV=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)
            if [ -z "$PREV" ]; then
              echo "No previous tag found — treating scripts as changed."
              echo "changed=true" >> "$GITHUB_OUTPUT"
            elif git diff --quiet "$PREV" "${{ github.ref_name }}" -- src/scripts/; then
              echo "src/scripts unchanged since $PREV — skipping image build."
              echo "changed=false" >> "$GITHUB_OUTPUT"
            else
              echo "src/scripts changed since $PREV — building image."
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Log in to Docker Hub
        if: steps.check.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: steps.check.outputs.changed == 'true'
        env:
          IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.DOCKERHUB_REGISTRY }}
          TAG:   ${{ inputs.image_tag || github.ref_name }}
        run: |
          docker build -t "$IMAGE:$TAG" src/scripts/
          docker push "$IMAGE:$TAG"
          if [[ "${{ github.event_name }}" == "release" ]]; then
            docker tag "$IMAGE:$TAG" "$IMAGE:latest"
            docker push "$IMAGE:latest"
          fi
          echo "Pushed $IMAGE:$TAG"
