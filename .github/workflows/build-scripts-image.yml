name: Build and push platform-scripts image

on:
  push:
    branches: [main]
    paths:
      - src/scripts/**
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # OIDC for AWS auth

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TERRAFORM_ROLE_ARN }}
          aws-region:     ${{ secrets.AWS_REGION }}

      - name: Log in to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE:    platform-scripts
          SHA:      ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$IMAGE:$SHA" -t "$REGISTRY/$IMAGE:latest" src/scripts/
          docker push "$REGISTRY/$IMAGE:$SHA"
          docker push "$REGISTRY/$IMAGE:latest"
          echo "Pushed $REGISTRY/$IMAGE:$SHA"
