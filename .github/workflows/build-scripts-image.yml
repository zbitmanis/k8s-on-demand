name: Build and push platform-scripts image

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if src/scripts changed since last release
        id: check
        run: |
          PREV=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)
          if [ -z "$PREV" ]; then
            echo "No previous tag found — treating scripts as changed."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --quiet "$PREV" "${{ github.ref_name }}" -- src/scripts/; then
            echo "src/scripts unchanged since $PREV — skipping image build."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "src/scripts changed since $PREV — building image."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: steps.check.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: steps.check.outputs.changed == 'true'
        env:
          IMAGE:  ${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.DOCKERHUB_REGISTRY }}
          TAG:   ${{ github.ref_name }}
        run: |
          docker build -t "$IMAGE:$TAG" -t "$IMAGE:latest" src/scripts/
          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:latest"
          echo "Pushed $IMAGE:$TAG"
